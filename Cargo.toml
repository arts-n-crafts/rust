[package]
name = "arts-and-crafts_rs"
version = "0.1.0"
edition = "2021"

[dependencies]
async-trait = "0.1.89"
serde = "1.0.219"
tokio = { version = "1.47.1", features = ["sync", "rt"] }

[dev-dependencies]
tokio = { version = "1.47.1", features = ["macros", "rt", "test-util"] }
rstest = "0.26.1"
sqlx = { version = "0.8.6", features = ["sqlite", "runtime-tokio"] }
